services:
  iii-init:
    image: busybox:1.36
    user: "0:0"
    volumes:
      - iii-data:/data
    entrypoint: ["sh", "-c", "chown -R 65532:65532 /data && chmod 755 /data"]
    restart: "no"

  iii-engine:
    image: iiidev/iii:${AGENTMEMORY_III_VERSION:-0.11.2}
    user: "65532:65532"
    env_file:
      - .env
    depends_on:
      iii-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:3111:3111"
      - "127.0.0.1:3112:3112"
      - "127.0.0.1:3113:3113"
      - "127.0.0.1:9464:9464"
    volumes:
      - iii-data:/data
      - ./iii-config.docker.yaml:/app/config.yaml:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  iii-data:
